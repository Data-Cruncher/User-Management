<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Sybase ASE Unlock Portal{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/static/style.css" rel="stylesheet">
</head>
<body>
{% if user %}
<nav class="navbar navbar-expand-lg sup-navbar sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand sup-brand" href="/dashboard">
      <i class="bi bi-shield-lock-fill me-2"></i>Sybase ASE Unlock Portal
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
        {% if user.is_dba %}
        <li class="nav-item"><a class="nav-link" href="/unlock"><i class="bi bi-unlock-fill me-1"></i>Unlock User</a></li>
        <li class="nav-item"><a class="nav-link" href="/audit"><i class="bi bi-clock-history me-1"></i>Audit History</a></li>
        {% endif %}
      </ul>
      <ul class="navbar-nav align-items-lg-center">
        <li class="nav-item me-2">
          <button id="themeToggle" class="btn btn-sm sup-btn-ghost" type="button" title="Toggle dark mode">
            <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
          </button>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle me-1"></i>{{ user.display_name }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-item-text text-muted small">Roles: {{ user.roles | join(', ') }}</span></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="/logout"><i class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
{% endif %}

<main class="{% if user %}container-fluid px-4 py-4{% endif %}">
  {% block content %}{% endblock %}
</main>

<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
